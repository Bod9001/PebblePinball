<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SillyBounce Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #550055 0%, #1a1a2e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ff55aa;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff55aa;
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .file-upload-area {
            border: 3px dashed #55ffff;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(85, 255, 255, 0.05);
        }

        .file-upload-area:hover {
            background: rgba(85, 255, 255, 0.1);
            border-color: #ff55aa;
        }

        .file-upload-area.dragover {
            background: rgba(85, 255, 255, 0.2);
            border-color: #ff55aa;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 16px;
            font-weight: 600;
            color: #55ffff;
            margin-bottom: 8px;
        }

        .upload-subtext {
            font-size: 12px;
            opacity: 0.7;
            color: #ffffff;
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            border-left: 4px solid #55ff00;
            display: none;
        }

        .file-name.active {
            display: block;
        }

        .file-name-text {
            font-weight: 600;
            color: #55ff00;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-send {
            background: linear-gradient(135deg, #ff55aa 0%, #ff77bb 100%);
            color: #1a1a2e;
            box-shadow: 0 4px 12px rgba(255, 85, 170, 0.3);
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 85, 170, 0.4);
        }

        .btn-send:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: #55ffff;
            border: 2px solid #55ffff;
        }

        .btn-clear:hover {
            background: rgba(85, 255, 255, 0.2);
            box-shadow: 0 4px 12px rgba(85, 255, 255, 0.2);
        }

        .btn-clear:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.success {
            background: rgba(85, 255, 0, 0.2);
            color: #55ff00;
            border: 2px solid #55ff00;
            display: block;
        }

        .status-message.error {
            background: rgba(255, 51, 102, 0.2);
            color: #ff3366;
            border: 2px solid #ff3366;
            display: block;
        }

        .status-message.info {
            background: rgba(85, 255, 255, 0.2);
            color: #55ffff;
            border: 2px solid #55ffff;
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .info-box {
            background: rgba(85, 255, 255, 0.1);
            border-left: 4px solid #55ffff;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-box strong {
            color: #55ffff;
        }

        @media (max-width: 480px) {
            body { padding: 15px; }
            .section { padding: 20px; }
            h1 { font-size: 24px; }
            .file-upload-area { padding: 30px 15px; }
            .upload-icon { font-size: 36px; }
            button { padding: 12px 16px; font-size: 14px; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ SillyBounce Settings</h1>
            <p class="subtitle">Load custom game layout</p>
        </header>

        <div class="section">
            <div class="file-upload-area" id="dropZone">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Select or drag layout file</div>
                <div class="upload-subtext">Upload a .txt layout or legacy .json config</div>
            </div>

            <input type="file" id="fileInput" accept=".txt,.json" />

            <div class="file-name" id="fileName">
                <span class="file-name-text" id="fileNameText"></span>
            </div>

            <div class="status-message" id="statusMessage"></div>

            <div class="button-group">
                <button class="btn-send" id="sendBtn" disabled>📤 Send to Watch</button>
                <button class="btn-clear" id="clearBtn" disabled>✕ Clear</button>
            </div>

            <div class="info-box">
                <strong>Accepted formats:</strong><br>
                <strong>.txt</strong> — new line-based layout format (N, P, S, G, H, K, B, U, W, D, V lines)<br>
                <strong>.json</strong> — legacy JSON layout, will be auto-converted
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameEl = document.getElementById('fileName');
        const fileNameText = document.getElementById('fileNameText');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusMessage = document.getElementById('statusMessage');

        let parsedConfig = null;

        dropZone.addEventListener('click', function() { fileInput.click(); });

        fileInput.addEventListener('change', function(e) {
            handleFileSelect(e.target.files[0]);
        });

        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', function() {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (file == null) return;

            if (file.name.endsWith('.txt') == false && file.name.endsWith('.json') == false) {
                showStatus('❌ Please select a .txt or .json file', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let configString;

                    if (file.name.endsWith('.json')) {
                        const json = JSON.parse(e.target.result);
                        configString = convertJsonToLineFormat(json);
                    } else {
                        configString = e.target.result;
                    }

                    // Must have an N line
                    const hasName = configString.split('\n').find(function(l) { return l.startsWith('N '); });
                    if (hasName == null) {
                        throw new Error('Missing layout name (N line)');
                    }

                    // Size check
                    if (configString.length > 8000) {
                        throw new Error('Config too large (max 8KB)');
                    }

                    parsedConfig = configString;

                    fileNameText.textContent = '✓ ' + file.name;
                    fileNameEl.classList.add('active');
                    sendBtn.disabled = false;
                    clearBtn.disabled = false;

                    showStatus('✓ Loaded: ' + file.name, 'success');
                } catch (error) {
                    showStatus('❌ ' + error.message, 'error');
                    parsedConfig = null;
                }
            };

            reader.onerror = function() {
                showStatus('❌ Error reading file', 'error');
            };

            reader.readAsText(file);
        }

        function convertJsonToLineFormat(json) {
            const lines = [];
            lines.push('N ' + json.name);
            const p = json.physics;
            lines.push('P ' + p.ballRadius + ',' + p.gravity + ',' + p.friction + ',' + p.wallBouncy + ',' + p.maxSpeed + ',' + p.maxLaunch);
            const s = json.score;
            lines.push('S ' + s.x + ',' + s.y + ',' + s.w + ',' + s.h + ',' + s.font + ',' + s.fontSize + ',' + s.color.r + ',' + s.color.g + ',' + s.color.b + ',' + s.colorHighScore.r + ',' + s.colorHighScore.g + ',' + s.colorHighScore.b);
            const g = json.gameOverText;
            lines.push('G ' + g.text + ',' + g.x + ',' + g.y + ',' + g.w + ',' + g.h + ',' + g.font + ',' + g.fontSize + ',' + g.color.r + ',' + g.color.g + ',' + g.color.b);
            const h = json.highScoreText;
            lines.push('H ' + h.text + ',' + h.Failtext + ',' + h.x + ',' + h.y + ',' + h.w + ',' + h.h + ',' + h.font + ',' + h.fontSize + ',' + h.color.r + ',' + h.color.g + ',' + h.color.b);
            const bg = json.backgroundColor;
            lines.push('K ' + bg.r + ',' + bg.g + ',' + bg.b);
            const b = json.ball;
            lines.push('B ' + b.startX + ',' + b.startY + ',' + b.vx + ',' + b.vy + ',' + b.color.r + ',' + b.color.g + ',' + b.color.b);
            for (let i = 0; i < json.bumpers.length; i++) {
                const u = json.bumpers[i];
                lines.push('U ' + u.cx + ',' + u.cy + ',' + u.radius + ',' + u.AddScore + ',' + u.fillColor.r + ',' + u.fillColor.g + ',' + u.fillColor.b + ',' + u.ringColor.r + ',' + u.ringColor.g + ',' + u.ringColor.b + ',' + u.Strength);
            }
            for (let i = 0; i < json.walls.length; i++) {
                const w = json.walls[i];
                if (w.behavior === 'bonker') {
                    lines.push('W ' + w.x1 + ',' + w.y1 + ',' + w.x2 + ',' + w.y2 + ',bonker,' + w.color.r + ',' + w.color.g + ',' + w.color.b + ',' + w.BonkerMagnitude);
                } else {
                    lines.push('W ' + w.x1 + ',' + w.y1 + ',' + w.x2 + ',' + w.y2 + ',wall,' + w.color.r + ',' + w.color.g + ',' + w.color.b);
                }
            }
            for (let i = 0; i < json.paddles.length; i++) {
                const d = json.paddles[i];
                lines.push('D ' + d.side + ',' + d.pivotX + ',' + d.pivotY + ',' + d.length + ',' + d.restAngle + ',' + d.activeAngle + ',' + d.angularSpeed + ',' + d.color.r + ',' + d.color.g + ',' + d.color.b);
            }
            const v = json.velocityLineColor;
            lines.push('V ' + v.r + ',' + v.g + ',' + v.b);
            return lines.join('\n');
        }

        function sendToWatch() {
            if (parsedConfig == null) {
                showStatus('❌ No config loaded', 'error');
                return;
            }
            showStatus('📤 Sending...', 'info');
            document.location = 'pebblejs://close#' + encodeURIComponent(parsedConfig);
        }

        function clearSelection() {
            parsedConfig = null;
            fileInput.value = '';
            fileNameEl.classList.remove('active');
            sendBtn.disabled = true;
            clearBtn.disabled = true;
            showStatus('✓ Cleared', 'info');
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = 'status-message ' + type;
            if (type === 'info') return;
            setTimeout(function() {
                statusMessage.className = 'status-message';
            }, 4000);
        }

        sendBtn.addEventListener('click', sendToWatch);
        clearBtn.addEventListener('click', clearSelection);
    </script>
</body>
</html>
