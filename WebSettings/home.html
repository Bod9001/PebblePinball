<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SillyBounce Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #550055 0%, #1a1a2e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ff55aa;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff55aa;
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .file-upload-area {
            border: 3px dashed #55ffff;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(85, 255, 255, 0.05);
        }

        .file-upload-area:hover {
            background: rgba(85, 255, 255, 0.1);
            border-color: #ff55aa;
        }

        .file-upload-area.dragover {
            background: rgba(85, 255, 255, 0.2);
            border-color: #ff55aa;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 16px;
            font-weight: 600;
            color: #55ffff;
            margin-bottom: 8px;
        }

        .upload-subtext {
            font-size: 12px;
            opacity: 0.7;
            color: #ffffff;
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            border-left: 4px solid #55ff00;
            display: none;
        }

        .file-name.active {
            display: block;
        }

        .file-name-text {
            font-weight: 600;
            color: #55ff00;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-send {
            background: linear-gradient(135deg, #ff55aa 0%, #ff77bb 100%);
            color: #1a1a2e;
            box-shadow: 0 4px 12px rgba(255, 85, 170, 0.3);
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 85, 170, 0.4);
        }

        .btn-send:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: #55ffff;
            border: 2px solid #55ffff;
        }

        .btn-clear:hover {
            background: rgba(85, 255, 255, 0.2);
            box-shadow: 0 4px 12px rgba(85, 255, 255, 0.2);
        }

        .btn-clear:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.success {
            background: rgba(85, 255, 0, 0.2);
            color: #55ff00;
            border: 2px solid #55ff00;
            display: block;
        }

        .status-message.error {
            background: rgba(255, 51, 102, 0.2);
            color: #ff3366;
            border: 2px solid #ff3366;
            display: block;
        }

        .status-message.info {
            background: rgba(85, 255, 255, 0.2);
            color: #55ffff;
            border: 2px solid #55ffff;
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-box {
            background: rgba(85, 255, 255, 0.1);
            border-left: 4px solid #55ffff;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-box strong {
            color: #55ffff;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .section {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .file-upload-area {
                padding: 30px 15px;
            }

            .upload-icon {
                font-size: 36px;
            }

            button {
                padding: 12px 16px;
                font-size: 14px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ SillyBounce Settings</h1>
            <p class="subtitle">Load custom game layout</p>
        </header>

        <div class="section">
            <div class="file-upload-area" id="dropZone">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Select or drag JSON file</div>
                <div class="upload-subtext">Upload a custom LAYOUT configuration</div>
            </div>

            <input type="file" id="fileInput" accept=".json" />

            <div class="file-name" id="fileName">
                <span class="file-name-text" id="fileNameText"></span>
            </div>

            <div class="status-message" id="statusMessage"></div>

            <div class="button-group">
                <button class="btn-send" id="sendBtn" disabled>📤 Send to Watch</button>
                <button class="btn-clear" id="clearBtn" disabled>✕ Clear</button>
            </div>

            <div class="info-box">
                <strong>Expected JSON format:</strong><br>
                Your JSON should contain the LAYOUT configuration with physics, backgroundColor, ball, score, etc.
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameEl = document.getElementById('fileName');
        const fileNameText = document.getElementById('fileNameText');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusMessage = document.getElementById('statusMessage');

        let selectedFile = null;
        let parsedConfig = null;

        // Click to select file
        dropZone.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        function handleFileSelect(file) {
            if (!file) return;

            if (!file.name.endsWith('.json')) {
                showStatus('❌ Please select a .json file', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    
                    // Basic validation
                    if (!json || typeof json !== 'object') {
                        throw new Error('Invalid JSON structure');
                    }

                    parsedConfig = json;
                    selectedFile = file;
                    
                    fileNameText.textContent = `✓ ${file.name}`;
                    fileNameEl.classList.add('active');
                    sendBtn.disabled = false;
                    clearBtn.disabled = false;
                    
                    showStatus(`✓ Loaded: ${file.name}`, 'success');
                } catch (error) {
                    showStatus(`❌ Invalid JSON: ${error.message}`, 'error');
                    selectedFile = null;
                    parsedConfig = null;
                }
            };

            reader.onerror = () => {
                showStatus('❌ Error reading file', 'error');
            };

            reader.readAsText(file);
        }

        function sendToWatch() {
            if (!parsedConfig) {
                showStatus('❌ No config loaded', 'error');
                return;
            }

            try {
                const configJson = JSON.stringify(parsedConfig);

                // Check size limit
                if (configJson.length > 8000) {
                    showStatus('❌ Config too large (max 8KB)', 'error');
                    return;
                }

                if (typeof Pebble !== 'undefined') {
                    Pebble.sendAppMessage(
                        { layoutConfig: configJson },
                        () => {
                            showStatus(`✓ Sent to watch! (${(configJson.length / 1024).toFixed(1)}KB)`, 'success');
                        },
                        (error) => {
                            showStatus(`❌ Send failed: ${error}`, 'error');
                        }
                    );
                } else {
                    showStatus('✓ Config ready (Pebble API not available for testing)', 'info');
                    console.log('Config to send:', parsedConfig);
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }

        function clearSelection() {
            selectedFile = null;
            parsedConfig = null;
            fileInput.value = '';
            fileNameEl.classList.remove('active');
            sendBtn.disabled = true;
            clearBtn.disabled = true;
            showStatus('✓ Cleared', 'info');
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
            setTimeout(() => {
                statusMessage.className = 'status-message';
            }, 4000);
        }

        sendBtn.addEventListener('click', sendToWatch);
        clearBtn.addEventListener('click', clearSelection);
    </script>
</body>
</html>
